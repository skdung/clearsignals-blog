{{ define "main" }}
  <section class="shell page-shell">
    <header class="page-header">
      <p class="eyebrow">{{ if eq .Kind "taxonomy" }}Category{{ else }}Browse{{ end }}</p>
      <h1>{{ .Title }}</h1>
      <p class="page-intro">{{ .Description | default .Site.Params.description }}</p>
    </header>

    <div class="card-grid">
      {{ range .Pages.ByDate.Reverse }}
        {{ partial "article-card.html" (dict "page" .) }}
      {{ else }}
        <p>No articles yet.</p>
      {{ end }}
    </div>
  </section>
{{ end }}
