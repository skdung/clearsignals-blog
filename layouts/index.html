{{ define "main" }}
<section class="hero">
    <h1>{{ .Site.Title }}</h1>
    <p class="tagline">{{ .Site.Params.description }}</p>
</section>
<section class="posts">
    <h2>Latest Articles</h2>
    {{ range first 10 (where .Site.RegularPages "Section" "posts") }}
    <article>
        <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
        <time>{{ .Date.Format "January 2, 2006" }}</time>
        <p>{{ .Description }}</p>
    </article>
    {{ else }}
    <p>First articles coming soon.</p>
    {{ end }}
</section>
{{ end }}
