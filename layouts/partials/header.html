<header class="site-header">
  <div class="shell header-shell">
    <a class="brand" href="{{ "/" | relURL }}">
      <img src="{{ "img/logo-horizontal.png" | relURL }}" alt="{{ .Site.Title }}" class="brand-logo">
    </a>

    <nav class="primary-nav" aria-label="Primary">
      {{ range .Site.Params.categories }}
        {{ if .show_in_nav }}
          <a href="{{ printf "/categories/%s/" .slug | relURL }}">{{ .nav_label }}</a>
        {{ end }}
      {{ end }}
      <a href="{{ "/about/" | relURL }}">About</a>
    </nav>

    <a class="subscribe-link" href="{{ if .IsHome }}#home-newsletter{{ else }}#article-newsletter{{ end }}">Subscribe</a>
  </div>
</header>
