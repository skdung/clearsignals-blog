  about_short = "Clear Signals is an evidence-based publication by Archer Keane exploring the hidden forces behind your decisions about money, health, and the world around you."
  contact_email = "hello@clearsignals.cloud"
  buttondown_username = "clearsignals"
  buttondown_action = "https://buttondown.com/api/emails/embed-subscribe/clearsignals"
  newsletter_heading = "Get evidence-based insights delivered weekly"
  newsletter_copy = "Join readers who want clear thinking on money, health, and the forces shaping their decisions."
  newsletter_note = "Free. No spam. Unsubscribe anytime."

